# Nginx reverse proxy for lp.querotreinar.com -> Next.js standalone (127.0.0.1:3000)
# Put this in /etc/nginx/sites-available/lp.querotreinar.com and symlink to sites-enabled.
# Run certbot afterwards to add HTTPS (it edits this file automatically).

server {
    listen 80;
    listen [::]:80;
    server_name lp.querotreinar.com;

    # Larger uploads / long videos
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # Long-cache the static assets and videos
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /videos/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000";
    }
}
